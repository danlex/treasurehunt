<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feed — Treasure Hunt</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #ff4a3d;
    --red-dark: #d63a2a;
    --red-light: #ff9a8f;
    --dark: #0f0f0f;
    --light-bg: #f7f6f4;
    --text: #111111;
    --text-sec: #4a4a4a;
    --border: #ebebeb;
    --font-display: 'Space Grotesk', 'Segoe UI', sans-serif;
    --font-body: 'Manrope', 'Segoe UI', sans-serif;
  }
  body {
    font-family: var(--font-body);
    color: var(--text);
    background: #fff;
    line-height: 1.5;
  }
  h1, h2, h3 {
    font-family: var(--font-display);
    letter-spacing: -0.01em;
  }

  nav {
    position: sticky;
    top: 0;
    height: 72px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 1000;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-text {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    color: #FF4931;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a {
    color: var(--text-sec);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--red); }

  .hero {
    max-width: 980px;
    margin: 0 auto;
    padding: 56px 40px 24px;
  }
  .red-label {
    display: inline-block;
    color: var(--red);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .hero h1 {
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 14px;
  }
  .hero h1 span { color: var(--red); }
  .hero p {
    font-size: 16px;
    color: var(--text-sec);
    font-weight: 300;
    max-width: 580px;
  }

  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px 40px 80px;
  }
  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-sec);
    border: 1px dashed var(--border);
    border-radius: 12px;
  }
  .post {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .post:hover {
    border-color: #d4d4d4;
    box-shadow: 0 4px 18px rgba(0,0,0,0.05);
  }
  .post-image {
    height: 180px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
  }
  .post-image::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.15) 0%, transparent 50%);
  }
  .post-image-label {
    position: relative;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 8px 20px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(8px);
    border-radius: 6px;
  }
  /* category colors */
  .cat-AI             { background: linear-gradient(135deg, #ff4a3d 0%, #ff9a8f 100%); }
  .cat-Quantum        { background: linear-gradient(135deg, #5b3eff 0%, #b78fff 100%); }
  .cat-Cybersecurity  { background: linear-gradient(135deg, #0f0f0f 0%, #4a4a4a 100%); }
  .cat-Startups       { background: linear-gradient(135deg, #10b981 0%, #6ee7b7 100%); }
  .cat-Research       { background: linear-gradient(135deg, #0ea5e9 0%, #7dd3fc 100%); }
  .cat-TopTweets      { background: linear-gradient(135deg, #f59e0b 0%, #fcd34d 100%); }
  .cat-Viral          { background: linear-gradient(135deg, #ec4899 0%, #f9a8d4 100%); }

  .post-body {
    padding: 24px 28px;
  }
  .post-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--text-sec);
    flex-wrap: wrap;
  }
  .post-meta .dot { color: #ccc; }
  .post-meta time { font-weight: 500; }
  .post-title {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 12px;
  }
  .post-title a {
    color: var(--text);
    text-decoration: none;
  }
  .post-title a:hover { color: var(--red); }
  .post-summary {
    color: var(--text-sec);
    font-size: 15px;
    line-height: 1.65;
    margin-bottom: 18px;
  }
  .post-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-sec);
    background: var(--light-bg);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }
  .read-link {
    color: var(--red);
    font-weight: 600;
    font-size: 13px;
    text-decoration: none;
  }
  .read-link:hover { color: var(--red-dark); text-decoration: underline; }
  .source-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-sec);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  @media (max-width: 640px) {
    nav { padding: 0 20px; }
    .nav-links { gap: 14px; }
    .hero, main { padding-left: 20px; padding-right: 20px; }
    .post-body { padding: 20px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="./">
    <svg width="28" height="28" viewBox="107 107 786 786" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="6" fill="#f7f6f4"/>
      <path d="M892.95 447.19L552.77 107.06V106.92H106.92V552.81L447.19 893.07H893.08L892.95 447.18V447.19ZM868.91 447.19H552.78V131.19L868.91 447.18V447.19ZM123.99 123.99H535.71V447.19H447.19V535.75H123.99V123.99ZM535.71 464.25V535.75H464.25V464.25H535.71ZM131.04 552.81H447.19V868.94L131.04 552.81ZM876.01 876.01H464.25V552.81H552.77V464.25H876.01V876.01Z" fill="#FF4931"/>
      <path d="M290.55 255.08V272.11H273.12V389.18H255.88V281.12L236.53 272.11V255.08H290.55Z" fill="#FF4931"/>
      <path d="M366.8 255.08L346.7 389.18H321.03L300.92 255.08H318.53L329.85 330.57L331.7 342.92H336.02L337.88 330.57L349.19 255.08H366.8Z" fill="#FF4931"/>
      <path d="M424.68 372.12V389.18H382.92V255.08H400.17V372.12H424.68Z" fill="#FF4931"/>
      <path d="M552.77 641.5L572.22 650.55V759.11H589.54V658.63V641.5H607.06V624.37H552.77V641.5Z" fill="#FF4931"/>
      <path d="M642.28 700.21H668.27V683.08H642.28L641.92 641.5H668.84V624.37H636.12H624.96V641.5V651.53V759.11H626.91H668.84H669.45V741.98H642.28V700.21Z" fill="#FF4931"/>
      <path d="M687.35 741.98V759.11H729.89V741.98H704.67V641.5H729.89V624.37H687.35V741.98Z" fill="#FF4931"/>
      <path d="M788.8 624.37V683.08H767.63V624.37H750.3V759.11H767.63V700.21H788.8V759.11H806.12V624.37H788.8Z" fill="#FF4931"/>
    </svg>
    <span class="nav-logo-text">TREASURE HUNT</span>
  </a>
  <div class="nav-links">
    <a href="https://github.com/danlex/treasurehunt" target="_blank" rel="noopener">GitHub ↗</a>
  </div>
</nav>

<section class="hero">
  <span class="red-label" id="feed-label">Hourly drop · April 2026</span>
  <h1>The <span>feed</span>.</h1>
  <p>One curated post each hour. Top picks from AI, Quantum, Cybersecurity, Startups, Research and viral social.</p>
</section>

<main id="feed">
  <div class="empty">No posts yet. First one drops in the next hour.</div>
</main>

<script>
function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

function catClass(cat) {
  return "cat-" + cat.replace(/[^A-Za-z]/g, "");
}

async function load() {
  const res = await fetch("posts.json?t=" + Date.now());
  const posts = await res.json();
  const feed = document.getElementById("feed");
  if (!posts.length) return;

  feed.innerHTML = posts.map(p => `
    <article class="post">
      <div class="post-image ${catClass(p.category)}">
        <span class="post-image-label">${p.category}</span>
      </div>
      <div class="post-body">
        <div class="post-meta">
          <time datetime="${p.publishedAt}">${timeAgo(p.publishedAt)}</time>
          <span class="dot">•</span>
          <span class="source-badge">${p.source}</span>
        </div>
        <h2 class="post-title"><a href="${p.url}" target="_blank" rel="noopener">${p.title}</a></h2>
        <p class="post-summary">${p.summary}</p>
        <div class="post-footer">
          <div class="tags">
            ${p.tags.map(t => `<span class="tag">${t}</span>`).join("")}
          </div>
          <a class="read-link" href="${p.url}" target="_blank" rel="noopener">Read source →</a>
        </div>
      </div>
    </article>
  `).join("");
}
load();
</script>
</body>
</html>
