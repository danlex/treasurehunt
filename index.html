<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Treasure Hunt — TVL Tech</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #ff4a3d;
    --red-dark: #d63a2a;
    --red-light: #ff9a8f;
    --dark: #0f0f0f;
    --light-bg: #f7f6f4;
    --text: #111111;
    --text-sec: #4a4a4a;
    --border: #ebebeb;
    --font-display: 'Space Grotesk', 'Segoe UI', sans-serif;
    --font-body: 'Manrope', 'Segoe UI', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    color: var(--text);
    background: #fff;
    line-height: 1.5;
  }
  h1, h2, h3 {
    font-family: var(--font-display);
    letter-spacing: -0.01em;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    height: 72px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 1000;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-text {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    color: #FF4931;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .nav-stats {
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: var(--text-sec);
  }
  .nav-stats b { color: var(--text); font-weight: 600; }

  /* HERO */
  .hero {
    max-width: 980px;
    margin: 0 auto;
    padding: 64px 40px 32px;
  }
  .red-label {
    display: inline-block;
    color: var(--red);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .hero h1 {
    font-size: clamp(34px, 5vw, 52px);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 18px;
  }
  .hero h1 span { color: var(--red); }
  .hero p {
    font-size: 17px;
    color: var(--text-sec);
    font-weight: 300;
    max-width: 620px;
  }

  /* FEED */
  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 16px 40px 120px;
  }
  .category {
    margin: 40px 0 14px;
    padding-left: 14px;
    border-left: 4px solid var(--red);
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 12px;
    transition: border-color 0.15s, box-shadow 0.15s, opacity 0.25s;
  }
  .card:hover { border-color: #d4d4d4; }
  .card.liked {
    border-color: var(--red);
    box-shadow: 0 2px 8px rgba(255, 74, 61, 0.1);
  }
  .card.disliked { opacity: 0.4; background: var(--light-bg); }
  .card.skipped { opacity: 0.55; }
  .card-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-desc {
    color: var(--text-sec);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .actions { display: flex; gap: 8px; }
  button {
    font-family: var(--font-body);
    background: #fff;
    border: 1px solid var(--border);
    color: var(--text-sec);
    padding: 7px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }
  button:hover { border-color: #c8c8c8; color: var(--text); }
  button.like.active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  button.dislike.active {
    background: var(--dark);
    border-color: var(--dark);
    color: #fff;
  }
  button.skip.active {
    background: var(--light-bg);
    border-color: #c8c8c8;
    color: var(--text);
  }

  /* SUBMIT BAR */
  .submit-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    justify-content: center;
    gap: 12px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
    z-index: 100;
  }
  .btn-primary {
    background: var(--red);
    color: #fff;
    border: 0;
    padding: 12px 28px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 14px;
    transition: background 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary:hover { background: var(--red-dark); }
  .btn-secondary {
    background: #fff;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 6px;
    font-weight: 500;
    font-size: 14px;
  }
  .btn-secondary:hover { border-color: #c8c8c8; }

  @media (max-width: 640px) {
    nav { padding: 0 20px; }
    .nav-stats { gap: 12px; font-size: 12px; }
    .hero, main { padding-left: 20px; padding-right: 20px; }
    .submit-bar { padding: 12px 20px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">
    <svg width="28" height="28" viewBox="107 107 786 786" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="6" fill="#f7f6f4"/>
      <path d="M892.95 447.19L552.77 107.06V106.92H106.92V552.81L447.19 893.07H893.08L892.95 447.18V447.19ZM868.91 447.19H552.78V131.19L868.91 447.18V447.19ZM123.99 123.99H535.71V447.19H447.19V535.75H123.99V123.99ZM535.71 464.25V535.75H464.25V464.25H535.71ZM131.04 552.81H447.19V868.94L131.04 552.81ZM876.01 876.01H464.25V552.81H552.77V464.25H876.01V876.01Z" fill="#FF4931"/>
      <path d="M290.55 255.08V272.11H273.12V389.18H255.88V281.12L236.53 272.11V255.08H290.55Z" fill="#FF4931"/>
      <path d="M366.8 255.08L346.7 389.18H321.03L300.92 255.08H318.53L329.85 330.57L331.7 342.92H336.02L337.88 330.57L349.19 255.08H366.8Z" fill="#FF4931"/>
      <path d="M424.68 372.12V389.18H382.92V255.08H400.17V372.12H424.68Z" fill="#FF4931"/>
      <path d="M552.77 641.5L572.22 650.55V759.11H589.54V658.63V641.5H607.06V624.37H552.77V641.5Z" fill="#FF4931"/>
      <path d="M642.28 700.21H668.27V683.08H642.28L641.92 641.5H668.84V624.37H636.12H624.96V641.5V651.53V759.11H626.91H668.84H669.45V741.98H642.28V700.21Z" fill="#FF4931"/>
      <path d="M687.35 741.98V759.11H729.89V741.98H704.67V641.5H729.89V624.37H687.35V741.98Z" fill="#FF4931"/>
      <path d="M788.8 624.37V683.08H767.63V624.37H750.3V759.11H767.63V700.21H788.8V759.11H806.12V624.37H788.8Z" fill="#FF4931"/>
    </svg>
    <span class="nav-logo-text">TREASURE HUNT</span>
  </a>
  <div class="nav-stats">
    <a href="feed.html" style="color: var(--text-sec); text-decoration: none; font-weight: 500; margin-right: 18px;">Feed →</a>
    <span>Liked <b id="stat-like">0</b></span>
    <span>Disliked <b id="stat-dislike">0</b></span>
    <span>Left <b id="stat-none">0</b></span>
  </div>
</nav>

<section class="hero">
  <span class="red-label">Daily digest · April 12, 2026</span>
  <h1>Find today's <span>treasure</span> in AI news.</h1>
  <p>Like what's worth a deeper dive. Dislike the noise. When done, submit — picks go straight back to the agent as a GitHub issue. No copy-paste.</p>
</section>

<main id="feed"></main>

<div class="submit-bar">
  <button class="btn-secondary" onclick="resetAll()">Reset</button>
  <a id="submitBtn" class="btn-primary" href="#" target="_blank" rel="noopener">Submit picks via GitHub →</a>
</div>

<script>
const REPO = "danlex/treasurehunt";
const ITEMS = [
  { cat: "AI", title: "OpenAI GPT-5.4 launches", desc: "1M token context, 75% on OSWorld-V (above human 72.4%) — autonomous digital coworker." },
  { cat: "AI", title: "Google Gemini 3.1 Ultra", desc: "2M token context, natively multimodal across text/image/audio/video, sandboxed code execution mid-conversation." },
  { cat: "AI", title: "Meta debuts Muse Spark", desc: "Meta's first major AI model under Alexandr Wang at Meta Superintelligence Labs." },
  { cat: "AI", title: "GLM-5.1 cracks top 3 on LM Code Arena", desc: "First frontier-level open model to break top 3." },
  { cat: "AI", title: "Anthropic MCP crosses 97M installs", desc: "Linux Foundation taking Model Context Protocol under open governance." },

  { cat: "Quantum", title: "AI + quantum breakthrough", desc: "Time reports AI sparked a major quantum advance — 'the world is not ready'." },
  { cat: "Quantum", title: "Millisecond quantum error detection", desc: "New method identifies errors orders of magnitude faster than existing techniques." },
  { cat: "Quantum", title: "Fault-tolerant quantum without mid-circuit measurements", desc: "Innsbruck/Aachen team ran Grover's algorithm on 3 logical qubits on trapped-ion processor." },
  { cat: "Quantum", title: "Microsoft + Atom Computing deliver level-2 quantum", desc: "Error-corrected quantum computers shipping to customers in 2026." },
  { cat: "Quantum", title: "Quantum crypto threat accelerates", desc: "Google + Oratomic papers suggest encryption-breaking quantum may come sooner; Cloudflare pulls post-quantum target to 2029." },

  { cat: "Cybersecurity", title: "Claude Code source code leaked", desc: "Anthropic employee accidentally leaked source; threat actors seeded fake GitHub repos delivering Vidar infostealer." },
  { cat: "Cybersecurity", title: "Chrome zero-day #4 of 2026 patched", desc: "Out-of-band Chrome 146 update fixes actively-exploited CVE-2026-5281." },
  { cat: "Cybersecurity", title: "Citrix NetScaler under active exploit", desc: "CVE-2026-3055 lets attackers read sensitive appliance memory and steal session material." },
  { cat: "Cybersecurity", title: "Smart Slider 3 Pro supply chain attack", desc: "Update system hijacked for ~6 hours on April 7, distributed weaponized RAT." },
  { cat: "Cybersecurity", title: "Vulnerability exploits overtake phishing", desc: "Cisco Talos: 40% of Q4 2025 intrusions came from exploited flaws, now #1 initial access method." },

  { cat: "Startups", title: "Q1 2026: $300B global venture funding", desc: "All-time record, up 150% QoQ. AI = 80% of total ($242B)." },
  { cat: "Startups", title: "Mega rounds: OpenAI $122B, Anthropic $30B", desc: "xAI $20B, Waymo $16B. Four of the five largest VC rounds ever closed in Q1." },
  { cat: "Startups", title: "OpenAI valued at $852B post-money", desc: "Anthropic at $380B after Series G. D.E. Shaw and MGX co-led both financings." },
  { cat: "Startups", title: "Eclipse raises $1.3B", desc: "Cerebras backer raises for robotics and AI infrastructure." },
  { cat: "Startups", title: "10+ companies raised $1B+ rounds in Q1", desc: "Beyond the big 3 — chips, data centers, robotics, defense, autonomous vehicles, prediction markets." },

  { cat: "Research", title: "100x AI energy reduction (Tufts)", desc: "Combining neural nets with symbolic reasoning slashes energy use and boosts accuracy." },
  { cat: "Research", title: "Google TurboQuant at ICLR 2026", desc: "PolarQuant + Quantized Johnson-Lindenstrauss dramatically reduces KV cache memory overhead." },
  { cat: "Research", title: "MIT AI uncovers atomic defects", desc: "Model improves heat transfer and energy conversion for semiconductors and renewables." },
  { cat: "Research", title: "Physics-informed ML (Hawai'i)", desc: "Algorithm makes AI obey physics laws for fluid dynamics and climate modeling." },
  { cat: "Research", title: "Neuromorphic computers solve physics equations", desc: "Brain-inspired processors now handling complex physics simulations." },

  { cat: "Top Tweets", title: "@Light_2610 — 102K likes", desc: "ChatGPT nostalgia: 'Tweeted this 2 months after ChatGPT came out — one of the last to experience that euphoria.'" },
  { cat: "Top Tweets", title: "BTS Yoongi 'walking GPT' — 38K likes", desc: "@syubjim post about Namjoon calling Yoongi 'walking GPT' went viral." },
  { cat: "Top Tweets", title: "MIT 'ChatGPT delusional spiraling' — 36K likes", desc: "@heynavtoor surfaces MIT research; Spanish version by @tendenciaytuits hit 33K." },
  { cat: "Top Tweets", title: "@karpathy on LLM knowledge bases with Obsidian", desc: "18K likes. Practical take on personal knowledge + LLMs." },
  { cat: "Top Tweets", title: "Claude Computer Use on Windows", desc: "@claudeai, 7.7K likes. OpenCode (Claude Code fork for any LLM) also trending." },

  { cat: "Viral / Reddit", title: "Reddit kills r/all", desc: "Long-standing unfiltered discovery feed officially deprecated April 2, moved to algorithmic personalization." },
  { cat: "Viral / Reddit", title: "AI-generated Maduro arrest images", desc: "Highly realistic fakes went viral, sparked widespread confusion across platforms." },
  { cat: "Viral / Reddit", title: "April Fools AI meme wave", desc: "Fake 'system messages' pretending AI took over phones, laptops, fridges — dominated X, IG, Reddit." },
  { cat: "Viral / Reddit", title: "'AI employees' discourse", desc: "Dominated LinkedIn throughout early April." }
];

const STORAGE_KEY = "treasurehunt-picks-2026-04-12";
const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

function render() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";
  let currentCat = "";
  ITEMS.forEach((item, i) => {
    if (item.cat !== currentCat) {
      currentCat = item.cat;
      const h = document.createElement("h2");
      h.className = "category";
      h.textContent = currentCat;
      feed.appendChild(h);
    }
    const verdict = state[i] || "";
    const card = document.createElement("div");
    card.className = "card " + (verdict || "");
    card.innerHTML = `
      <div class="card-title"></div>
      <div class="card-desc"></div>
      <div class="actions">
        <button class="like ${verdict === "liked" ? "active" : ""}" data-i="${i}" data-v="liked">Like</button>
        <button class="dislike ${verdict === "disliked" ? "active" : ""}" data-i="${i}" data-v="disliked">Dislike</button>
        <button class="skip ${verdict === "skipped" ? "active" : ""}" data-i="${i}" data-v="skipped">Skip</button>
      </div>
    `;
    card.querySelector(".card-title").textContent = item.title;
    card.querySelector(".card-desc").textContent = item.desc;
    card.querySelectorAll("button").forEach(b => {
      b.addEventListener("click", () => vote(+b.dataset.i, b.dataset.v));
    });
    feed.appendChild(card);
  });
  updateStats();
  updateSubmitLink();
}

function vote(i, verdict) {
  if (state[i] === verdict) delete state[i];
  else state[i] = verdict;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  render();
}

function updateStats() {
  const c = { liked: 0, disliked: 0, skipped: 0 };
  Object.values(state).forEach(v => c[v] !== undefined && c[v]++);
  document.getElementById("stat-like").textContent = c.liked;
  document.getElementById("stat-dislike").textContent = c.disliked;
  document.getElementById("stat-none").textContent = ITEMS.length - c.liked - c.disliked - c.skipped;
}

function buildIssueBody() {
  const groups = { liked: [], disliked: [], skipped: [] };
  ITEMS.forEach((item, i) => {
    const v = state[i];
    if (v) groups[v].push(`- **[${item.cat}]** ${item.title} — ${item.desc}`);
  });
  let body = `Treasure Hunt picks — ${new Date().toISOString().slice(0, 10)}\n\n`;
  if (groups.liked.length)    body += `## Liked (${groups.liked.length})\n\n${groups.liked.join("\n")}\n\n`;
  if (groups.disliked.length) body += `## Disliked (${groups.disliked.length})\n\n${groups.disliked.join("\n")}\n\n`;
  if (groups.skipped.length)  body += `## Skipped (${groups.skipped.length})\n\n${groups.skipped.join("\n")}\n\n`;
  if (!groups.liked.length && !groups.disliked.length && !groups.skipped.length) {
    body += `_No picks yet._\n`;
  }
  return body;
}

function updateSubmitLink() {
  const title = `Picks ${new Date().toISOString().slice(0, 10)}`;
  const body = buildIssueBody();
  const url = `https://github.com/${REPO}/issues/new?title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}&labels=picks`;
  document.getElementById("submitBtn").href = url;
}

function resetAll() {
  if (!confirm("Clear all picks?")) return;
  Object.keys(state).forEach(k => delete state[k]);
  localStorage.removeItem(STORAGE_KEY);
  render();
}

render();
</script>
</body>
</html>
