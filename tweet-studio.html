<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tweet Studio — Treasure Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #111827;
      --panel-2: #1a2234;
      --text: #e5e7eb;
      --mute: #64748b;
      --accent: #38bdf8;
      --green: #22c55e;
      --red: #ef4444;
      --border: #1f2937;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      padding: 14px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }
    header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
    header .meta { font-size: 13px; color: var(--mute); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    main {
      flex: 1; display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: var(--border); min-height: 0;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto auto; }
    }

    section { background: var(--bg); padding: 20px; overflow: hidden;
              display: flex; flex-direction: column; min-height: 0; }
    section h2 {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--mute); margin-bottom: 12px; font-weight: 700;
    }

    /* LEFT: draft editor */
    .news-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; margin-bottom: 16px;
    }
    .news-card .cat {
      display: inline-block; font-size: 10px; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 3px 8px; border-radius: 4px;
      background: var(--panel-2); color: var(--accent); margin-bottom: 8px;
    }
    .news-card .title { font-size: 17px; font-weight: 600; line-height: 1.35; margin-bottom: 6px; }
    .news-card .summary { font-size: 13px; color: #94a3b8; line-height: 1.5; }

    .draft-area {
      flex: 1; display: flex; flex-direction: column; min-height: 0;
    }
    textarea#draft {
      flex: 1; min-height: 200px;
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px; font: 500 16px 'Inter', sans-serif;
      line-height: 1.5; resize: vertical;
    }
    textarea#draft:focus { outline: 2px solid var(--accent); }

    .draft-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px; gap: 12px; flex-wrap: wrap;
    }
    .char-count { font-size: 13px; color: var(--mute); font-variant-numeric: tabular-nums; }
    .char-count.warn { color: #f59e0b; }
    .char-count.over { color: var(--red); font-weight: 700; }

    .preview-image {
      margin-top: 12px; border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; background: var(--panel);
      display: flex; align-items: center; justify-content: center;
      max-height: 160px;
    }
    .preview-image img { width: 100%; height: auto; object-fit: cover; display: block; }
    .preview-image .empty { color: var(--mute); font-size: 13px; padding: 20px; }

    .btn {
      padding: 9px 16px; border-radius: 8px; font: 600 13px 'Inter', sans-serif;
      cursor: pointer; border: none; transition: all 0.12s;
    }
    .btn:disabled { opacity: 0.5; cursor: wait; }
    .btn-primary {
      background: var(--accent); color: #04060f;
    }
    .btn-primary:hover:not(:disabled) { background: #0ea5e9; }
    .btn-ghost {
      background: transparent; color: var(--text); border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--panel); }
    .btn-post {
      background: #000; color: #fff; border: 1px solid #222;
    }
    .btn-post:hover:not(:disabled) { background: #1d1d1d; }

    /* RIGHT: chat */
    .chat-body {
      flex: 1; overflow-y: auto; padding-right: 4px;
      display: flex; flex-direction: column; gap: 10px; min-height: 0;
    }
    .chat-msg {
      max-width: 85%; padding: 10px 14px; border-radius: 12px;
      font-size: 14px; line-height: 1.5; white-space: pre-wrap;
    }
    .chat-msg.user {
      align-self: flex-end; background: var(--accent); color: #04060f;
    }
    .chat-msg.ai {
      align-self: flex-start; background: var(--panel); border: 1px solid var(--border);
    }
    .chat-msg .delta {
      font-size: 11px; color: var(--mute); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .chat-form {
      display: flex; gap: 8px; margin-top: 12px;
    }
    .chat-form input {
      flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--panel); color: var(--text); font: 500 14px 'Inter', sans-serif;
    }
    .chat-form input:focus { outline: 2px solid var(--accent); }
    .suggestion-chips {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .chip {
      font-size: 12px; padding: 5px 10px; border-radius: 999px;
      background: var(--panel); color: var(--mute); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.12s;
    }
    .chip:hover { color: var(--text); border-color: var(--accent); }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--panel); border: 1px solid var(--border);
      padding: 12px 22px; border-radius: 8px; font-size: 14px;
      opacity: 0; transition: opacity 0.25s; pointer-events: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; }
    .toast.ok { border-color: var(--green); }
    .toast.err { border-color: var(--red); }
  </style>
</head>
<body>
  <header>
    <h1>𝕏 TWEET STUDIO</h1>
    <span class="meta" id="meta">Loading…</span>
    <a href="/">← Back to review</a>
  </header>

  <main>
    <!-- LEFT pane -->
    <section>
      <h2>Draft</h2>
      <div class="news-card" id="news-card"></div>
      <div class="draft-area">
        <textarea id="draft" placeholder="Your tweet draft..."></textarea>
        <div class="draft-footer">
          <span class="char-count" id="char-count">0 / 280</span>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-ghost" id="btn-regen">Regenerate</button>
            <button class="btn btn-post" id="btn-post">Publish with image →</button>
          </div>
        </div>
        <div class="preview-image" id="preview-image"></div>
      </div>
    </section>

    <!-- RIGHT pane -->
    <section>
      <h2>Chat with AI</h2>
      <div class="suggestion-chips" id="chips">
        <span class="chip" data-sug="Make it punchier, shorter.">Punchier</span>
        <span class="chip" data-sug="Open with a hook question.">Hook question</span>
        <span class="chip" data-sug="Add one well-chosen emoji.">+1 emoji</span>
        <span class="chip" data-sug="More analytical, less hype.">More analytical</span>
        <span class="chip" data-sug="Lead with the strongest number.">Lead with number</span>
        <span class="chip" data-sug="Mention @KryptonAi once at the end.">Mention @KryptonAi</span>
      </div>
      <div class="chat-body" id="chat-body"></div>
      <form class="chat-form" id="chat-form">
        <input type="text" id="chat-input" placeholder="Tell me what to change..." autocomplete="off" />
        <button type="submit" class="btn btn-primary" id="btn-send">Send</button>
      </form>
    </section>
  </main>

  <div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(location.search);
const ID = params.get('id');
let item = null;
let imageRel = null;
let history = [];

const el = {
  draft:     document.getElementById('draft'),
  charCount: document.getElementById('char-count'),
  meta:      document.getElementById('meta'),
  newsCard:  document.getElementById('news-card'),
  preview:   document.getElementById('preview-image'),
  chatBody:  document.getElementById('chat-body'),
  chatForm:  document.getElementById('chat-form'),
  chatInput: document.getElementById('chat-input'),
  btnRegen:  document.getElementById('btn-regen'),
  btnPost:   document.getElementById('btn-post'),
  btnSend:   document.getElementById('btn-send'),
  toast:     document.getElementById('toast'),
  chips:     document.getElementById('chips'),
};

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

function xCharCount(t) {
  return (t || '').replace(/https?:\/\/\S+/g, 'x'.repeat(23)).length;
}

const TWEET_MAX = 900;
function updateCharCount() {
  const c = xCharCount(el.draft.value);
  el.charCount.textContent = `${c} / ${TWEET_MAX}`;
  el.charCount.className = 'char-count';
  if (c > TWEET_MAX) el.charCount.classList.add('over');
  else if (c > TWEET_MAX - 50) el.charCount.classList.add('warn');
}

function showToast(text, tone = '') {
  el.toast.textContent = text;
  el.toast.className = 'toast show ' + tone;
  setTimeout(() => { el.toast.className = 'toast ' + tone; }, 3500);
}

function appendChat(role, text, delta = null) {
  const d = document.createElement('div');
  d.className = 'chat-msg ' + role;
  d.innerHTML = (delta ? `<div class="delta">${escapeHtml(delta)}</div>` : '') + escapeHtml(text);
  el.chatBody.appendChild(d);
  el.chatBody.scrollTop = el.chatBody.scrollHeight;
}

async function loadInitial() {
  if (!ID) { showToast('Missing ?id=<item-id>', 'err'); return; }
  try {
    const r = await fetch(`/api/tweet/${ID}`);
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'fetch failed');
    item = j.item;
    imageRel = j.imageRel;
    el.draft.value = j.text;
    updateCharCount();
    el.meta.textContent = item.category + ' · ' + (item.source || '');
    el.newsCard.innerHTML = `
      <div class="cat">${escapeHtml(item.category || '')}</div>
      <div class="title">${escapeHtml(item.title || '')}</div>
      <div class="summary">${escapeHtml((item.summary || '').slice(0, 280))}${(item.summary || '').length > 280 ? '…' : ''}</div>
    `;
    el.preview.innerHTML = imageRel
      ? `<img src="/${imageRel}" alt="preview" />`
      : `<div class="empty">No image generated for this item yet — run ▶ Animate first.</div>`;
  } catch (e) {
    showToast('Load error: ' + e.message, 'err');
  }
}

async function revise(instruction) {
  if (!instruction.trim()) return;
  appendChat('user', instruction);
  el.btnSend.disabled = true;
  el.chatInput.disabled = true;
  try {
    const r = await fetch('/api/tweet-revise', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: ID,
        currentText: el.draft.value,
        instruction,
        history,
      }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'revise failed');
    history.push({ role: 'user',  text: instruction });
    history.push({ role: 'model', text: j.text });
    el.draft.value = j.text;
    updateCharCount();
    appendChat('ai', j.text, `Revised · ${j.chars} chars${j.overLimit ? ' · OVER LIMIT' : ''}`);
  } catch (e) {
    appendChat('ai', 'Error: ' + e.message);
  } finally {
    el.btnSend.disabled = false;
    el.chatInput.disabled = false;
    el.chatInput.focus();
  }
}

async function regenerate() {
  el.btnRegen.disabled = true;
  try {
    const r = await fetch(`/api/tweet/${ID}`);
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'fetch failed');
    el.draft.value = j.text;
    updateCharCount();
    appendChat('ai', j.text, 'Regenerated from scratch');
  } catch (e) {
    showToast('Regen error: ' + e.message, 'err');
  } finally {
    el.btnRegen.disabled = false;
  }
}

async function publish() {
  if (xCharCount(el.draft.value) > TWEET_MAX) {
    showToast(`Tweet is over ${TWEET_MAX} chars. Trim it first.`, 'err');
    return;
  }
  if (!confirm('Post this to X now?')) return;
  el.btnPost.disabled = true;
  el.btnPost.textContent = 'Posting…';
  try {
    const r = await fetch(`/api/x-post/${ID}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: el.draft.value, imagePath: imageRel }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || `HTTP ${r.status}`);
    showToast('Posted to X!', 'ok');
    el.btnPost.textContent = '𝕏 Posted';
    if (j.tweetUrl) {
      setTimeout(() => window.open(j.tweetUrl, '_blank', 'noopener'), 600);
    }
  } catch (e) {
    showToast('Post failed: ' + e.message, 'err');
    el.btnPost.disabled = false;
    el.btnPost.textContent = 'Publish with image →';
  }
}

el.chatForm.addEventListener('submit', e => {
  e.preventDefault();
  const v = el.chatInput.value;
  el.chatInput.value = '';
  revise(v);
});

el.chips.addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const sug = chip.dataset.sug;
  el.chatInput.value = sug;
  revise(sug);
  el.chatInput.value = '';
});

el.btnRegen.addEventListener('click', regenerate);
el.btnPost.addEventListener('click', publish);
el.draft.addEventListener('input', updateCharCount);

loadInitial();
</script>
</body>
</html>
